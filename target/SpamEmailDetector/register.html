<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register |Spam Detection System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="tech-hero-bg">
    <div id="page-loader">
    <div class="spinner"></div>
    <div class="loader-text">Connecting....</div>
</div>
    <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
</div>
    <header class="nav-container">
        <div class="text-2xl font-bold">🛡️ <span class="text-blue-400">Spam Detection System </span></div>
        <a href="login.html" class="text-gray-400 hover:text-white transition">Log In</a>
    </header>

    <main class="content-wrapper">

        <div class="glass-card p-10 w-full max-w-md">
            <div class="flex justify-center mb-6">
        <div class="w-24 h-24 rounded-full bg-gradient-to-tr from-green-400 to-blue-500 flex items-center justify-center p-1 shadow-lg shadow-blue-500/20">
            <img src="images/add-user.png" alt="Profile" class="w-full h-full object-contain rounded-full">
            
            </div>
    </div>  
            <h2 class="text-3xl font-bold text-center mb-8">Create Account</h2>
            <form action="RegisterServlet" method="POST" onsubmit="return validatePasswords()" class="space-y-4">
                <input type="text" name="username" required placeholder="Full Name" class="auth-input">
                <input type="email" name="email" required placeholder="Email Address" class="auth-input">
                <input type="password" id="p1" name="password" required placeholder="Create Password" class="auth-input">
                <input type="password" id="p2" required placeholder="Confirm Password" class="auth-input">
                
                <p id="err" class="text-red-400 text-xs hidden">Passwords do not match!</p>
                
                <button type="submit" class="btn-blue w-full mt-4">Join SafeInbox</button>
            </form>
        </div>
    </main>

 <footer class="w-full py-10 border-t border-white/5 bg-black/20 text-center">
            <p class="text-gray-500 text-sm">&copy; 2026 Spam Detection System</p>
        </div>
    </footer>
   <script>
    window.addEventListener("load", function() {
        const loader = document.getElementById("page-loader");
        // Add a small timeout (500ms) so the user actually sees the loader
        setTimeout(() => {
            loader.classList.add("loader-hidden");
        }, 500);
    });
</script>
</body>
</html>
