<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Spam Detection System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Ensuring the dropdown options don't look white/broken on dark theme */
        select option {
            background-color: #0f172a !important; /* Matches slate-900 */
            color: white;
        }
    </style>
</head>
<body class="tech-hero-bg">
    <div id="page-loader">
        <div class="spinner"></div>
        <div class="loader-text">Connecting....</div>
    </div>
    
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header class="nav-container">
        <div class="text-2xl font-bold">🛡️ <span class="text-blue-400">Spam Detection System</span></div>
        <a href="index.html" class="text-gray-400 hover:text-white transition">← Home</a>
    </header>

    <main class="content-wrapper">
        <div class="glass-card p-10 w-full max-w-md">
            <div class="flex justify-center mb-6">
                <div class="w-24 h-24 rounded-full bg-gradient-to-tr from-green-400 to-blue-500 flex items-center justify-center p-1 shadow-lg shadow-blue-500/20">
                    <img src="images/user.png" alt="Profile" class="w-full h-full object-contain rounded-full">
                </div>
            </div>  
            <h2 class="text-3xl font-bold text-center mb-8">Login</h2>
<form action="LoginServlet" method="POST" class="space-y-6">
    <div class="mb-4 relative">
        <label class="block text-xs uppercase tracking-widest text-gray-400 mb-2">Access Level</label>
        <select name="role" required 
                class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-blue-500 transition appearance-none cursor-pointer">
            <option value="" disabled selected class="bg-slate-900 text-gray-400">Identify your role...</option>
            <option value="user" class="bg-slate-900 text-white">General User</option>
            <option value="admin" class="bg-slate-900 text-white">System Administrator</option>
        </select>
        <div class="absolute right-4 bottom-4 pointer-events-none text-gray-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
        </div>
    </div>

    <div>
        <label class="block text-xs uppercase tracking-widest text-gray-400 mb-2">Email Address</label>
        <input type="email" name="email" required placeholder="name@company.com" 
               class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition">
    </div>

    <div>
        <div class="flex justify-between mb-2">
            <label class="text-xs uppercase tracking-widest text-gray-400">Security Key</label>
            <a href="forgot-password.html" class="text-xs text-blue-400 hover:underline">Forgot?</a>
        </div>
        <input type="password" name="password" required placeholder="••••••••" 
               class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition">
    </div>

    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-blue-900/20">
        Authenticate & Enter
    </button>
</form>
            
            <p class="text-center mt-8 text-gray-500 text-sm">
                Don't have an account? <a href="register.html" class="text-blue-400 font-bold">Create Account</a>
            </p>
        </div>
    </main>

    <footer class="w-full py-10 border-t border-white/5 bg-black/20 text-center">
        <p class="text-gray-500 text-sm">&copy; 2026 Spam Detection System</p>
    </footer>

<script>
    window.addEventListener("load", function() {
        const loader = document.getElementById("page-loader");
        setTimeout(() => {
            loader.classList.add("loader-hidden");
        }, 500);
    });
</script>
</body>
</html>
