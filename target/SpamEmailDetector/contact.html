<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us |Spam Detection System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="hero-bg">

    <div id="page-loader">
        <div class="spinner"></div>
        <div class="loader-text">Loading Contact Center...</div>
    </div>

    <main class="content-wrapper">
        <div class="glass-card max-w-lg p-10 text-center">
            <div class="text-5xl mb-6">📬</div>
            
            <h1 class="text-3xl font-bold text-blue-400 mb-2">Get in Touch</h1>
            <p class="text-gray-400 mb-8 text-sm">Have questions about our trilingual detection engine? We're here to help.</p>
            
            <div class="space-y-4 text-left bg-black/30 p-6 rounded-2xl border border-white/10 mb-8">
                <div class="flex items-center gap-3">
                    <span class="text-blue-400">📧</span>
                    <p class="text-sm"><span class="font-bold">Email:</span> support@safeinbox.com</p>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-blue-400">⏰</span>
                    <p class="text-sm"><span class="font-bold">Hours:</span> Mon - Fri, 9 AM - 6 PM</p>
                </div>
            </div>

            <a href="mailto:support@safeinbox.com?subject=SafeInbox%20Support%20Request&body=Hello%20Team,%0D%0A%0D%0AI%20have%20a%20query%20regarding..." 
               class="btn-blue w-full flex items-center justify-center gap-3 py-4 shadow-lg shadow-blue-500/20">
                <span>Send Direct Email</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </a>

            <div class="mt-8 border-t border-white/5 pt-6">
                <a href="index.html" class="text-sm text-gray-500 hover:text-white transition flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    Back to Home
                </a>
            </div>
        </div>
    </main>
    
    <footer class="w-full py-10 border-t border-white/5 bg-black/20 text-center">
            <p class="text-gray-500 text-sm">&copy; 2026 Spam Detection System</p>
        </div>
    </footer>
    <script>
        window.addEventListener("load", function() {
            const loader = document.getElementById("page-loader");
            setTimeout(() => {
                loader.classList.add("loader-hidden");
            }, 500);
        });
    </script>

</body>
</html>
