<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password |Spam Detection System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="tech-hero-bg">
    <div id="page-loader">
    <div class="spinner"></div>
    <div class="loader-text">Connecting....</div>
</div>
    <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
</div>

    <header class="nav-container">
        <div class="text-2xl font-bold flex items-center gap-2">
        <div class="text-2xl font-bold">🛡️ <span class="text-blue-400">Spam Detection System </span></div>        </div>
        <div class="flex items-center gap-6">
            <a href="login.html" class="text-gray-400 hover:text-white transition font-medium">Log In</a>
        </div>
    </header>

    <main class="content-wrapper">
        <div class="glass-card p-10 w-full max-w-md text-center">
            
             <div class="flex justify-center mb-6">
        <div class="w-24 h-24 rounded-full bg-gradient-to-tr from-green-400 to-blue-500 flex items-center justify-center p-1 shadow-lg shadow-blue-500/20">
            <img src="images/key.png" alt="Profile" class="w-full h-full object-contain rounded-full">
            
            </div>
    </div>  
            
            <h2 class="text-3xl font-bold text-white mb-4">Forgot Password?</h2>
            <p class="text-gray-400 text-sm mb-8 leading-relaxed">
                Enter your registered email address below and we'll send you a link to reset your password.
            </p>
            
            <form action="ForgotPassServlet" method="POST" onsubmit="showLoader()" class="space-y-6">
                <div class="text-left">
                    <label class="block text-xs font-bold text-blue-400 uppercase tracking-widest mb-2 ml-1">
                        Email Address
                    </label>
                    <input type="email" name="email" required 
                           class="auth-input" 
                           placeholder="name@example.com">
                </div>
                
                <button type="submit" id="resetBtn" class="btn-blue w-full flex justify-center items-center gap-3">
                    <span id="btnText">Send Password</span>
                    <div id="loader" class="loader" style="width: 20px; height: 20px; margin: 0;"></div>
                </button>
            </form>
            
            <div class="mt-8">
                <a href="login.html" class="text-sm text-gray-500 hover:text-white transition flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    Back to Login
                </a>
            </div>
        </div>
    </main>

    <footer class="w-full py-10 border-t border-white/5 bg-black/20 text-center">
            <p class="text-gray-500 text-sm">&copy; 2026 Spam Detection System</p>
        </div>
    </footer>
   <script>
    window.addEventListener("load", function() {
        const loader = document.getElementById("page-loader");
                // Add a small timeout (500ms) so the user actually sees the loader
        setTimeout(() => {
            loader.classList.add("loader-hidden");
        }, 500);
    });
</script>
</body>
</html>
